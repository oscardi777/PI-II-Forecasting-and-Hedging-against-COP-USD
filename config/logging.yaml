# =========================================================
# logging.yaml
# Configuración de logging del proyecto (logging.config.dictConfig)
# =========================================================

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: WARNING
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    formatter: standard
    level: DEBUG
    filename: logs/forecast.log
    encoding: utf8

loggers:
  forecasting_copusd:
    level: DEBUG
    handlers: [console, file]
    propagate: false

root:
  level: INFO
  handlers: [console, file]
